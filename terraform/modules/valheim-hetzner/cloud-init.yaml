#cloud-config

runcmd:
  # Kernel tuning — protect game memory from being swapped when additional services run
  - sysctl -w vm.swappiness=10
  - echo "vm.swappiness=10" >> /etc/sysctl.conf

  # Create data directory and write admin list
  - mkdir -p /opt/valheim/data
  - truncate -s 0 /opt/valheim/data/adminlist.txt
%{ for id in valheim_admin_ids ~}
  - echo "${id}" >> /opt/valheim/data/adminlist.txt
%{ endfor ~}

write_files:
  - path: /opt/valheim/docker/.env
    permissions: "0600"
    content: |
      SERVER_NAME=${valheim_server_name}
      WORLD_NAME=${valheim_world_name}
      SERVER_PASS=${valheim_server_pass}
      SERVER_PUBLIC=true
      DISCORD_WEBHOOK_URL=${discord_webhook_url}
