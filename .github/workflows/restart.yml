name: "Server: Restart"

on:
  workflow_dispatch:

env:
  SERVER_HOST: ${{ vars.SERVER_HOST }}

jobs:
  restart:
    name: Restart Container
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Restart Valheim container
        run: |
          ssh root@${{ env.SERVER_HOST }} \
            "docker compose -f /opt/valheim/docker/compose.yaml --env-file /opt/valheim/docker/.env restart"

      - name: Write job summary
        run: |
          echo "## RedMist — Restarted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Container restarted at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
